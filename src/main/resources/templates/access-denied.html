<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>접근 권한 없음 - HanSung</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
    .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
    .error-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
        </li>
      </ul>
      <form th:action="@{/logout}" method="post" class="d-flex">
        <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
      </form>
    </div>
  </div>
</nav>

<div class="container text-center py-5">
  <div class="card error-card mx-auto" style="max-width: 500px;">
    <div class="card-body p-5">
      <div class="mb-4">
        <h1 class="display-1 text-danger fw-bold mb-0">403</h1>
        <h4 class="text-danger fw-semibold">Forbidden</h4>
      </div>

      <h5 class="fw-bold mb-3">페이지 접근 권한이 없습니다.</h5>
      <p class="text-muted mb-4">관리자(ADMIN) 권한이 필요한 메뉴입니다.<br>일반 사용자는 접근할 수 없습니다.</p>

      <a th:href="@{/home}" class="btn btn-primary px-4 fw-semibold">홈으로 돌아가기</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<footer class="container text-center mt-5 mb-4 text-muted" style="font-size: 0.9em;">
  <hr>
  <p>
    학번: 2171021 &nbsp;│&nbsp; 성명: 김성민 &nbsp;│&nbsp; 실습 수행: <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
  </p>
</footer>

</body>
</html>
